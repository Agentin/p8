version: '3.8'

services:
  auth:
    build:
      context: ../..          # корень проекта
      dockerfile: services/auth/Dockerfile
    container_name: auth
    environment:
      AUTH_PORT: 8081
      AUTH_GRPC_PORT: 50051
    networks:
      - internal
    restart: unless-stopped

  tasks:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: tasks
    environment:
      TASKS_PORT: 8082
      AUTH_GRPC_ADDR: auth:50051    # обращение к контейнеру auth
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tasksdb
    depends_on:
      - postgres
      - auth
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    ports:
      - "8443:8443"
    depends_on:
      - tasks
      - auth
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasksdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8433:5432"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data: